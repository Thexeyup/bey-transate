import net.md_5.bungee.api.chat.ClickEvent;
import net.md_5.bungee.api.chat.HoverEvent;
import net.md_5.bungee.api.chat.TextComponent;
import net.md_5.bungee.api.chat.hover.content.Text;
import org.bukkit.Bukkit;
import org.bukkit.entity.Player;
import java.io.BufferedReader;
import java.io.InputStreamReader;
import java.net.HttpURLConnection;
import java.net.URL;
import java.net.URLEncoder;

public class RevengeTranslator {

    // Mesajı butonla birlikte gönderir
    public static void sendWithTranslateButton(Player receiver, Player sender, String rawMessage) {
        TextComponent base = new TextComponent("§f" + sender.getName() + ": §7" + rawMessage + " ");
        
        // Çeviri Butonu: [🌐]
        TextComponent btn = new TextComponent("§b[🌐]");
        btn.setHoverEvent(new HoverEvent(HoverEvent.Action.SHOW_TEXT, new Text("§eBu mesajı Türkçe'ye çevir")));
        
        // Tıklandığında gizli bir komut çalıştırır (Komutu aşağıda tanımlayacağız)
        // Mesajı URL-Safe hale getiriyoruz ki komut bozulmasın
        String encodedMsg = URLEncoder.encode(rawMessage);
        btn.setClickEvent(new ClickEvent(ClickEvent.Action.RUN_COMMAND, "/internal-translate " + encodedMsg));

        base.addExtra(btn);
        receiver.spigot().sendMessage(base);
    }

    // Arka planda Google üzerinden çeviri yapan metod
    public static void translateAsync(Player player, String textToTranslate) {
        Bukkit.getScheduler().runTaskAsynchronously(Bukkit.getPluginManager().getPlugin("Revenge"), () -> {
            try {
                // Google Translate Ücretsiz Web API URL (Script tabanlı)
                String urlStr = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=tr&dt=t&q=" + textToTranslate;
                URL url = new URL(urlStr);
                HttpURLConnection con = (HttpURLConnection) url.openConnection();
                con.setRequestProperty("User-Agent", "Mozilla/5.0");

                BufferedReader in = new BufferedReader(new InputStreamReader(con.getInputStream()));
                String inputLine;
                StringBuilder response = new StringBuilder();
                while ((inputLine = in.readLine()) != null) response.append(inputLine);
                in.close();

                // Basit JSON temizleme (Kütüphane kullanmadan hızlı çözüm)
                String translated = response.toString().split("\"")[1];

                // Sonucu oyuncuya gönder
                player.sendMessage("§8[§bRevenge-Çeviri§8] §f" + translated);

            } catch (Exception e) {
                player.sendMessage("§cÇeviri sırasında bir hata oluştu.");
            }
        });
    }
}
